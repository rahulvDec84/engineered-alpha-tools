<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Engineered Alpha | Promoter Buying</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-dark bg-dark shadow">
    <div class="container">

        <span class="navbar-brand mb-0 h1">
            📈 Engineered Alpha
        </span>

    </div>
</nav>

<div class="container mt-4">

    <div class="text-center mb-4">

        <h2>Promoter Buying Dashboard</h2>

        <p class="text-muted">

            Daily SEBI Promoter Transactions

        </p>

    </div>

    <div class="row g-3 mb-4">

        <div class="col-md-3">

            <div class="card summary-card">

                <div class="card-body">

                    <h6>Total Companies</h6>

                    <h3 id="companyCount">0</h3>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card summary-card">

                <div class="card-body">

                    <h6>Total Transactions</h6>

                    <h3 id="transactionCount">0</h3>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card summary-card">

                <div class="card-body">

                    <h6>Total Value</h6>

                    <h3 id="totalValue">₹0</h3>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card summary-card">

                <div class="card-body">

                    <h6>Last Updated</h6>

                    <h3 id="lastUpdated">--</h3>

                </div>

            </div>

        </div>

    </div>

    <div class="row mb-3">

        <div class="col-md-6">

            <input
                type="text"
                id="searchInput"
                class="form-control"
                placeholder="🔍 Search Company...">

        </div>

    </div>

    <div class="table-responsive">

        <table class="table table-striped table-hover align-middle" id="promoterTable">

            <thead class="table-dark">

                <tr>

                    <th>Company</th>

                    <th>Promoter</th>

                    <th>Category</th>

                    <th>Date</th>

                    <th>Transaction</th>

                    <th>Shares</th>

                    <th>Value</th>

                    <th>Holding Before</th>

                    <th>Holding After</th>

                </tr>

            </thead>

            <tbody>

                <!-- Data comes from CSV -->

            </tbody>

        </table>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script src="script.js"></script>

</body>

</html>
