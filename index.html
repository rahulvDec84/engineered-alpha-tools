<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Engineered Alpha - Promoter Buying</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-dark shadow">

<div class="container">

<span class="navbar-brand">

📈 Engineered Alpha

</span>

</div>

</nav>


<div class="container mt-4">

<h2 class="mb-4 text-center">

Promoter Buying Dashboard

</h2>


<div class="row mb-4">

<div class="col-md-4">

<select class="form-select" id="periodSelect">

<option value="1">Last 2 Weeks</option>
<option value="2">Last 4 Weeks</option>
<option value="3">Last 3 Months</option>
<option value="4">Last 6 Months</option>

</select>

</div>

<div class="col-md-8">

<input
type="text"
id="searchInput"
class="form-control"
placeholder="Search Company or Symbol">

</div>

</div>


<div class="table-responsive">

<table class="table table-hover table-striped align-middle" id="stockTable">

<thead class="table-dark">

<tr>

<th>Company</th>

<th>Promoter</th>

<th>Date</th>

<th>Shares</th>

<th>Holding Before</th>

<th>Holding After</th>

<th>Transaction</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
